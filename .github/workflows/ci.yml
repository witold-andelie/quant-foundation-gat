name: quant-alpha-ci

on:
  pull_request:
  push:
    branches:
      - main

env:
  REGISTRY: europe-west3-docker.pkg.dev
  IMAGE_NAME: ${{ secrets.GCP_PROJECT_ID }}/second-foundation-containers/quant-alpha-foundation

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Lint
        run: ruff check src tests streamlit_app

      - name: Unit tests
        run: pytest -x -q

  pipeline-smoke:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Run equity pipeline (offline)
        run: quant-alpha run --offline

      - name: Run energy pipeline (synthetic)
        run: quant-alpha energy-run

      - name: Run dlt ingestion pipelines (incremental load test)
        run: |
          quant-alpha dlt-energy --start 2024-01-01 --end 2024-01-15
          quant-alpha dlt-equity --offline

      - name: Alpha regression gate
        run: |
          python - <<'PY'
          import json, sys
          from pathlib import Path
          import duckdb

          db = Path("data/warehouse/quant_alpha.duckdb")
          if not db.exists():
              print("No DuckDB found — skip regression gate", file=sys.stderr)
              sys.exit(0)

          with duckdb.connect(str(db), read_only=True) as con:
              tables = [r[0] for r in con.execute("SHOW TABLES").fetchall()]
              if "alpha_diagnostics" not in tables:
                  print("alpha_diagnostics missing — skip", file=sys.stderr)
                  sys.exit(0)
              df = con.execute(
                  "SELECT alpha_name, oos_ic_mean, consistency_score FROM alpha_diagnostics"
              ).df()

          failed = []
          for _, row in df.iterrows():
              if row["consistency_score"] < 0:
                  failed.append(f"{row['alpha_name']}: consistency={row['consistency_score']:.3f}")

          if failed:
              print("ALPHA REGRESSION GATE FAILED:", file=sys.stderr)
              for f in failed:
                  print(" ", f, file=sys.stderr)
              sys.exit(1)

          print(f"Alpha gate passed ({len(df)} factors checked)")
          PY

      - name: Build dbt marts
        run: |
          cd dbt_quant_alpha && dbt build --profiles-dir .
          cd ../dbt_energy_alpha && dbt build --profiles-dir .

  k8s-validate:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Parse Kubernetes manifests
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml
          for path in sorted(Path("infra/k8s/base").glob("*.yaml")):
              with path.open() as f:
                  docs = list(yaml.safe_load_all(f))
              assert all(doc for doc in docs), path
          print("All K8s manifests parsed OK")
          PY

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "v4.1.4"

      - name: Helm lint (default values)
        run: helm lint infra/helm/quant-alpha/

      - name: Helm lint (dev overlay)
        run: helm lint infra/helm/quant-alpha/ -f infra/helm/quant-alpha/values.dev.yaml

      - name: Helm lint (prod overlay)
        run: helm lint infra/helm/quant-alpha/ -f infra/helm/quant-alpha/values.prod.yaml

      - name: Helm template (smoke render)
        run: |
          helm template quant-alpha infra/helm/quant-alpha/ \
            -f infra/helm/quant-alpha/values.dev.yaml \
            --namespace quant-alpha \
          | python - <<'PY'
          import sys, yaml
          docs = list(yaml.safe_load_all(sys.stdin))
          kinds = [d["kind"] for d in docs if d]
          assert "Deployment" in kinds, "Missing Deployment"
          assert "CronJob" in kinds, "Missing CronJob"
          assert "PersistentVolumeClaim" in kinds, "Missing PVC"
          print(f"Helm template smoke: {len(docs)} resources — {sorted(set(kinds))}")
          PY

  docker-build:
    runs-on: ubuntu-latest
    needs: pipeline-smoke
    # Only build and push images on pushes to main
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        if: ${{ secrets.GCP_PROJECT_ID != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Configure Docker for Artifact Registry
        if: ${{ secrets.GCP_PROJECT_ID != '' }}
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build image (always)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ secrets.GCP_PROJECT_ID != '' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  terraform-validate:
    runs-on: ubuntu-latest
    needs: lint-and-test
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init (local backend for CI)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan (GCP available)
        if: ${{ secrets.GCP_PROJECT_ID != '' }}
        permissions:
          contents: read
          id-token: write
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_github_repo: ${{ github.repository }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.GCP_PROJECT_ID }}-tf-state" \
            -backend-config="prefix=quant-alpha/state"
          terraform plan -out=tfplan -no-color 2>&1 | tee plan.txt
          echo "### Terraform Plan" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -20 plan.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  security-scan:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH
