apiVersion: batch/v1
kind: CronJob
metadata:
  name: energy-alpha-refresh
spec:
  schedule: "15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: energy-alpha-refresh
        spec:
          serviceAccountName: quant-alpha-runner
          restartPolicy: Never
          containers:
            - name: energy-alpha
              image: quant-alpha-foundation:0.1.0
              imagePullPolicy: IfNotPresent
              command: ["quant-alpha", "energy-run", "--config", "/app/configs/second_foundation_project.yaml"]
              envFrom:
                - configMapRef:
                    name: quant-alpha-config
                - secretRef:
                    name: quant-alpha-secrets
              volumeMounts:
                - name: quant-alpha-data
                  mountPath: /app/data
              resources:
                requests:
                  cpu: "500m"
                  memory: "1Gi"
                limits:
                  cpu: "2"
                  memory: "4Gi"
          volumes:
            - name: quant-alpha-data
              persistentVolumeClaim:
                claimName: quant-alpha-data
