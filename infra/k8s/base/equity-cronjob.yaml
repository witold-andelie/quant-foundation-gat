apiVersion: batch/v1
kind: CronJob
metadata:
  name: equity-alpha-refresh
spec:
  schedule: "0 23 * * 1-5"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: equity-alpha-refresh
        spec:
          serviceAccountName: quant-alpha-runner
          restartPolicy: Never
          containers:
            - name: equity-alpha
              image: quant-alpha-foundation:0.1.0
              imagePullPolicy: IfNotPresent
              command: ["quant-alpha", "run", "--offline", "--config", "/app/configs/project.yaml"]
              envFrom:
                - configMapRef:
                    name: quant-alpha-config
              volumeMounts:
                - name: quant-alpha-data
                  mountPath: /app/data
              resources:
                requests:
                  cpu: "250m"
                  memory: "512Mi"
                limits:
                  cpu: "1"
                  memory: "2Gi"
          volumes:
            - name: quant-alpha-data
              persistentVolumeClaim:
                claimName: quant-alpha-data
