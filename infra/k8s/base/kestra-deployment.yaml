---
# Kestra server — standalone mode (embedded H2 for demo; use Postgres for production)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kestra
  labels:
    app.kubernetes.io/name: kestra
    app.kubernetes.io/component: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kestra
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kestra
        app.kubernetes.io/component: orchestrator
    spec:
      serviceAccountName: quant-alpha-runner
      initContainers:
        # Pre-load flow definitions from the repo into Kestra's flow directory
        - name: flow-loader
          image: quant-alpha-foundation:0.1.0
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              mkdir -p /kestra-flows &&
              cp /app/flows/kestra/*.yaml /kestra-flows/ &&
              echo "Loaded $(ls /kestra-flows/ | wc -l) flows"
          volumeMounts:
            - name: kestra-flows
              mountPath: /kestra-flows
            - name: quant-alpha-data
              mountPath: /app/data
      containers:
        - name: kestra
          image: kestra/kestra:latest-full
          imagePullPolicy: IfNotPresent
          command: ["kestra", "server", "standalone", "--flow-path", "/kestra-flows"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 8081
              protocol: TCP
          env:
            - name: KESTRA_CONFIGURATION
              value: |
                kestra:
                  repository:
                    type: memory
                  storage:
                    type: local
                    local:
                      base-path: /tmp/kestra-storage
                  queue:
                    type: memory
          envFrom:
            - configMapRef:
                name: quant-alpha-config
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
          volumeMounts:
            - name: kestra-flows
              mountPath: /kestra-flows
            - name: quant-alpha-data
              mountPath: /app/data
      volumes:
        - name: kestra-flows
          emptyDir: {}
        - name: quant-alpha-data
          persistentVolumeClaim:
            claimName: quant-alpha-data
---
apiVersion: v1
kind: Service
metadata:
  name: kestra
  labels:
    app.kubernetes.io/name: kestra
    app.kubernetes.io/component: orchestrator
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: grpc
      port: 8081
      targetPort: grpc
  selector:
    app.kubernetes.io/name: kestra
