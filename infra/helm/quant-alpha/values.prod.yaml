# Production overlay — GKE cluster with GCP Artifact Registry.
# Usage: helm upgrade --install quant-alpha ./infra/helm/quant-alpha \
#          -f infra/helm/quant-alpha/values.prod.yaml \
#          --set image.tag=$GIT_SHA \
#          --set secrets.data.ENTSOE_API_KEY=$(base64 -w0 <<< "$ENTSOE_API_KEY")

global:
  environment: production

image:
  repository: europe-west3-docker.pkg.dev/REPLACE_PROJECT_ID/second-foundation-containers/quant-alpha-foundation
  pullPolicy: Always

persistence:
  storageClass: "standard-rwo"        # GKE standard persistent disk (RWO)
  size: 50Gi

dashboard:
  replicaCount: 2                      # HA: 2 replicas behind a LoadBalancer
  service:
    type: LoadBalancer
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "2Gi"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

energyCronJob:
  schedule: "15 * * * *"
  resources:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      cpu: "4"
      memory: "8Gi"

equityCronJob:
  schedule: "0 23 * * 1-5"
  offline: false                       # live yfinance in prod
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

serviceAccount:
  annotations:
    # Workload Identity — binds K8s SA to GCP SA for keyless auth
    iam.gke.io/gcp-service-account: quant-alpha-runner@REPLACE_PROJECT_ID.iam.gserviceaccount.com

podAnnotations:
  cluster-autoscaler.kubernetes.io/safe-to-evict: "true"

config:
  QUANT_ALPHA_ENV: "production"
  KAFKA_BOOTSTRAP_SERVERS: "redpanda.quant-alpha.svc.cluster.local:9092"
