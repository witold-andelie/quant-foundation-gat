{{- if .Values.dashboard.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: quant-alpha-dashboard
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "quant-alpha.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: {{ .Values.dashboard.service.type }}
  ports:
    - port: {{ .Values.dashboard.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "quant-alpha.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
{{- end }}
